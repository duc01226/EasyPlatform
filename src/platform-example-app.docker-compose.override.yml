version: '3.4'

services:
  sql-data:
    environment:
      SA_PASSWORD: 123456Abc
      ACCEPT_EULA: 'Y'
    ports:
      - '14330:1433'
    volumes:
      - Easy.Platform-sqldata:/var/opt/mssql
      - C:\AngularDotnetPlatformDockerSql\data:/var/opt/mssql/data

  mongo-data:
    ports:
      - '27017:27017'
    volumes:
      - Easy.Platform-mongodata-db:/data/db
      - Easy.Platform-mongodata-configdb:/data/configdb
    environment:
      - MONGO_INITDB_ROOT_USERNAME=root
      - MONGO_INITDB_ROOT_PASSWORD=rootPassXXX

  rabbitmq:
    ports:
      - '15672:15672'
      - '5672:5672'
    volumes:
      - Easy.Platform-rabbitmq-volume:/var/lib/rabbitmq

  redis-cache:
    ports:
      - '6379:6379'
    volumes:
      - Easy.Platform-redis-cache-data:/data

  text-snippet-api:
    environment:
      - ASPNETCORE_ENVIRONMENT=Development.Docker
      - ASPNETCORE_URLS=http://0.0.0.0:80
      - ConnectionStrings__DefaultConnection=${AngularDotnetPlatform_TEXTSNIPPET_DB:-Server=sql-data,1433;Database=TextSnippedDb;User Id=sa;Password=123456Abc}
      - MongoDB__ConnectionString=${AngularDotnetPlatform_TEXTSNIPPET_MONGODB:-mongodb://root:rootPassXXX@mongo-data:27017?authSource=admin}
      - UseMongoDb=${AngularDotnetPlatform_TEXTSNIPPET_UseMongoDb:-true}
      - RabbitMqOptions__HostNames=rabbitmq
    ports:
      - '5001:80'

  text-snippet-webspa:
    build:
      args:
        configuration: 'docker-dev'
    ports:
      - '4001:80'

volumes:
  Easy.Platform-sqldata:
    external: false
  Easy.Platform-mongodata-db:
    external: false
  Easy.Platform-mongodata-configdb:
    external: false
  Easy.Platform-rabbitmq-volume:
    external: false
  Easy.Platform-redis-cache-data:
    external: false
