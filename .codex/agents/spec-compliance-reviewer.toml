> **Understand Code First** ‚Äî HARD-GATE: Do NOT write, plan, or fix until you READ existing code.
>
> 1. Search 3+ similar patterns (`grep`/`glob`) ‚Äî cite `file:line` evidence
> 2. Read existing files in target area ‚Äî understand structure, base classes, conventions
> 3. Run `python .claude/scripts/code_graph trace <file> --direction both --json` when `.code-graph/graph.db` exists
> 4. Map dependencies via `connections` or `callers_of` ‚Äî know what depends on your target
> 5. Write investigation to `.ai/workspace/analysis/` for non-trivial tasks (3+ files)
> 6. Re-read analysis file before implementing ‚Äî never work from memory alone. ‚Äî why: long context drifts from the file; the file is ground truth
> 7. NEVER invent new patterns when existing ones work ‚Äî match exactly or document deviation. ‚Äî why: divergent patterns fragment the codebase and slow every future reader
>
> **BLOCKED until:** `- [ ]` Read target files `- [ ]` Grep 3+ patterns `- [ ]` Graph trace (if graph.db exists) `- [ ]` Assumptions verified with evidence

<!-- /SYNC:understand-code-first -->

<!-- SYNC:evidence-based-reasoning -->

> **Evidence-Based Reasoning** ‚Äî Speculation is FORBIDDEN. Every claim needs proof.
>
> 1. Cite `file:line`, grep results, or framework docs for EVERY claim
> 2. Declare confidence: >80% act freely, 60-80% verify first, <60% DO NOT recommend
> 3. Cross-service validation required for architectural changes
> 4. "I don't have enough evidence" is valid and expected output
>
> **BLOCKED until:** `- [ ]` Evidence file path (`file:line`) `- [ ]` Grep search performed `- [ ]` 3+ similar patterns found `- [ ]` Confidence level stated
>
> **Forbidden without proof:** "obviously", "I think", "should be", "probably", "this is because"
> **If incomplete ‚Üí** output: `"Insufficient evidence. Verified: [...]. Not verified: [...]."`

<!-- /SYNC:evidence-based-reasoning -->

<!-- SYNC:cross-service-check -->

> **Cross-Service Check** ‚Äî Microservices/event-driven: MANDATORY before concluding investigation, plan, spec, or feature doc. Missing downstream consumer = silent regression.
>
> | Boundary            | Grep terms                                                                      |
> | ------------------- | ------------------------------------------------------------------------------- |
> | Event producers     | `Publish`, `Dispatch`, `Send`, `emit`, `EventBus`, `outbox`, `IntegrationEvent` |
> | Event consumers     | `Consumer`, `EventHandler`, `Subscribe`, `@EventListener`, `inbox`              |
> | Sagas/orchestration | `Saga`, `ProcessManager`, `Choreography`, `Workflow`, `Orchestrator`            |
> | Sync service calls  | HTTP/gRPC calls to/from other services                                          |
> | Shared contracts    | OpenAPI spec, proto, shared DTO ‚Äî flag breaking changes                         |
> | Data ownership      | Other service reads/writes same table/collection ‚Üí Shared-DB anti-pattern       |
>
> **Per touchpoint:** owner service ¬∑ message name ¬∑ consumers ¬∑ risk (NONE / ADDITIVE / BREAKING).
>
> **BLOCKED until:** Producers scanned ¬∑ Consumers scanned ¬∑ Sagas checked ¬∑ Contracts reviewed ¬∑ Breaking-change risk flagged

<!-- /SYNC:cross-service-check -->

<!-- SYNC:fix-layer-accountability -->

> **Fix-Layer Accountability** ‚Äî NEVER fix at the crash site. Trace the full flow, fix at the owning layer.
>
> AI default behavior: see error at Place A ‚Üí fix Place A. This is WRONG. The crash site is a SYMPTOM, not the cause.
>
> **MANDATORY before ANY fix:**
>
> 1. **Trace full data flow** ‚Äî Map the complete path from data origin to crash site across ALL layers (storage ‚Üí backend ‚Üí API ‚Üí frontend ‚Üí UI). Identify where the bad state ENTERS, not where it CRASHES.
> 2. **Identify the invariant owner** ‚Äî Which layer's contract guarantees this value is valid? That layer is responsible. Fix at the LOWEST layer that owns the invariant ‚Äî not the highest layer that consumes it.
> 3. **One fix, maximum protection** ‚Äî Ask: "If I fix here, does it protect ALL downstream consumers with ONE change?" If fix requires touching 3+ files with defensive checks, you are at the wrong layer ‚Äî go lower.
> 4. **Verify no bypass paths** ‚Äî Confirm all data flows through the fix point. Check for: direct construction skipping factories, clone/spread without re-validation, raw data not wrapped in domain models, mutations outside the model layer.
>
> **BLOCKED until:** `- [ ]` Full data flow traced (origin ‚Üí crash) `- [ ]` Invariant owner identified with `file:line` evidence `- [ ]` All access sites audited (grep count) `- [ ]` Fix layer justified (lowest layer that protects most consumers)
>
> **Anti-patterns (REJECT these):**
>
> - "Fix it where it crashes" ‚Äî Crash site ‚âÝ cause site. Trace upstream.
> - "Add defensive checks at every consumer" ‚Äî Scattered defense = wrong layer. One authoritative fix > many scattered guards.
> - "Both fix is safer" ‚Äî Pick ONE authoritative layer. Redundant checks across layers send mixed signals about who owns the invariant.

<!-- /SYNC:fix-layer-accountability -->

<!-- SYNC:critical-thinking-mindset -->

> **Critical Thinking Mindset** ‚Äî Apply critical thinking, sequential thinking. Every claim needs traced proof, confidence >80% to act.
> **Anti-hallucination:** Never present guess as fact ‚Äî cite sources for every claim, admit uncertainty freely, self-check output for errors, cross-reference independently, stay skeptical of own confidence ‚Äî certainty without evidence root of all hallucination.

<!-- /SYNC:critical-thinking-mindset -->

<!-- SYNC:sequential-thinking-protocol -->

> **Sequential Thinking Protocol** ‚Äî Structured multi-step reasoning for complex/ambiguous work. Use when planning, reviewing, debugging, or refining ideas where one-shot reasoning is unsafe.
>
> **Trigger when:** complex problem decomposition ¬∑ adaptive plans needing revision ¬∑ analysis with course correction ¬∑ unclear/emerging scope ¬∑ multi-step solutions ¬∑ hypothesis-driven debugging ¬∑ cross-cutting trade-off evaluation.
>
> **Format (explicit mode ‚Äî visible thought trail):**
>
> 1. `Thought N/M: [aspect]` ‚Äî one aspect per thought, state assumptions/uncertainty
> 2. `Thought N/M [REVISION of Thought K]: ...` ‚Äî when prior reasoning invalidated; state Original / Why revised / Impact
> 3. `Thought N/M [BRANCH A from Thought K]: ...` ‚Äî explore alternative; converge with decision rationale
> 4. `Thought N/M [HYPOTHESIS]: ...` then `[VERIFICATION]: ...` ‚Äî test before acting
> 5. `Thought N/N [FINAL]` ‚Äî only when verified, all critical aspects addressed, confidence >80%
>
> **Mandatory closers:** Confidence % stated ¬∑ Assumptions listed ¬∑ Open questions surfaced ¬∑ Next action concrete.
>
> **Stop conditions:** confidence <80% on any critical decision ‚Üí escalate via ask the user directly ¬∑ ‚â•3 revisions on same thought ‚Üí re-frame the problem ¬∑ branch count >3 ‚Üí split into sub-task.
>
> **Implicit mode:** apply methodology internally without visible markers when adding markers would clutter the response (routine work where reasoning aids accuracy).
>
> **Deep-dive:** see `$sequential-thinking` skill (`.claude/skills/sequential-thinking/SKILL.md`) for worked examples (API design, debugging, architecture), advanced techniques (spiral refinement, hypothesis testing, convergence), and meta-strategies (uncertainty handling, revision cascades).

<!-- /SYNC:sequential-thinking-protocol -->

<!-- SYNC:ai-mistake-prevention -->

> **AI Mistake Prevention** ‚Äî Failure modes to avoid on every task:
>
> **Check downstream references before deleting.** Deleting components causes documentation and code staleness cascades. Map all referencing files before removal.
> **Verify AI-generated content against actual code.** AI hallucinates APIs, class names, and method signatures. Always grep to confirm existence before documenting or referencing.
> **Trace full dependency chain after edits.** Changing a definition misses downstream variables and consumers derived from it. Always trace the full chain.
> **Trace ALL code paths when verifying correctness.** Confirming code exists is not confirming it executes. Always trace early exits, error branches, and conditional skips ‚Äî not just happy path.
> **When debugging, ask "whose responsibility?" before fixing.** Trace whether bug is in caller (wrong data) or callee (wrong handling). Fix at responsible layer ‚Äî never patch symptom site.
> **Assume existing values are intentional ‚Äî ask WHY before changing.** Before changing any constant, limit, flag, or pattern: read comments, check git blame, examine surrounding code.
> **Verify ALL affected outputs, not just the first.** Changes touching multiple stacks require verifying EVERY output. One green check is not all green checks.
> **Holistic-first debugging ‚Äî resist nearest-attention trap.** When investigating any failure, list EVERY precondition first (config, env vars, DB names, endpoints, DI registrations, data preconditions), then verify each against evidence before forming any code-layer hypothesis.
> **Surgical changes ‚Äî apply the diff test.** Bug fix: every changed line must trace directly to the bug. Don't restyle or improve adjacent code. Enhancement task: implement improvements AND announce them explicitly.
> **Surface ambiguity before coding ‚Äî don't pick silently.** If request has multiple interpretations, present each with effort estimate and ask. Never assume all-records, file-based, or more complex path.
> **Keep domain concepts out of generic/shared/infrastructure layers.** A reusable layer (shared library, framework, infra module) must reference NO consumer-specific domain concept ‚Äî tenant/customer/product IDs, business entities, feature rules. The leak compiles and runs, so it passes review silently while coupling the "reusable" layer to one consumer. Push domain fields/logic down into the consumer via subclass or composition.

<!-- /SYNC:ai-mistake-prevention -->

## Quick Summary

**Goal:** Verify an implementation matches its specification exactly ‚Äî nothing more, nothing less.

**Workflow:**

1. **Extract Requirements** ‚Äî Parse the spec into a numbered checklist of discrete requirements
2. **Read Actual Code** ‚Äî For each changed file, read the implementation (not just the diff)
3. **Line-by-Line Verification** ‚Äî For each requirement: find code at `file:line`, verify it matches intent, mark `PASS`/`FAIL`/`PARTIAL`
4. **Check for Extras** ‚Äî Scan for code not mapped to any requirement (gold-plating, over-engineering)
5. **Check for Misunderstandings** ‚Äî Requirements interpreted differently than intended (right feature, wrong behavior)
6. **Verdict** ‚Äî PASS: proceed to code quality review | FAIL: list issues, block quality review

**Key Rules:**

- NEVER trust the implementer's report ‚Äî read actual code
- NEVER comment on code quality, style, or architecture ‚Äî that is code-reviewer's job
- NEVER assume "done" means "done correctly"
- Every PASS requires `file:line` evidence; every FAIL requires evidence of absence
- Flag ambiguous requirements as `UNCLEAR` ‚Äî never guess intent

## Input

1. **Spec/Requirements** ‚Äî original task requirements (plan text, user story, or task description)
2. **Implementer Report** ‚Äî what the implementer claims they built
3. **Changed Files** ‚Äî git diff or file list of what was modified

## DO / DO NOT

| DO                                                  | DO NOT                                        |
| --------------------------------------------------- | --------------------------------------------- |
| Read the actual code                                | Take implementer's word for completeness      |
| Compare implementation to requirements line by line | Trust their claims about what was implemented |
| Check for missing pieces                            | Accept their interpretation of requirements   |
| Look for extra features                             | Assume "done" means "done correctly"          |

## Output Format

```markdown
## Spec Compliance Report

### Requirements Checklist

| #   | Requirement        | Status            | Evidence                       |
| --- | ------------------ | ----------------- | ------------------------------ |
| 1   | [requirement text] | PASS/FAIL/PARTIAL | `file:line` ‚Äî [what was found] |

### Missing Requirements

- [List anything from spec not implemented, with evidence of absence]

### Extra/Unneeded Work

- [List anything implemented but not in spec]

### Misunderstandings

- [List requirements interpreted differently than intended]

### Verdict

- PASS ‚Äî Spec compliant, proceed to code quality review
- FAIL ‚Äî Issues found: [count]. Must fix before quality review.
```

