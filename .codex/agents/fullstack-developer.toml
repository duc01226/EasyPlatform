## Quick Summary

**Goal:** Execute plan phases with strict file ownership boundaries — handles backend and frontend tasks in parallel with other phases.

**Workflow:**

1. **Phase Analysis** — Read assigned phase file, verify file ownership list, check parallelization info
2. **Pre-Implementation Validation** — Confirm no file overlap with parallel phases, read project docs, verify dependencies complete
3. **Implementation** — Execute steps sequentially as listed; modify ONLY owned files
4. **Quality Assurance** — Run type checks, run tests, fix failures, verify success criteria
5. **Completion Report** — Files modified, tasks completed, tests status, conflicts if any

**Key Rules:**

