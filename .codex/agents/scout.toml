## Search Patterns by Priority

> **Stack-agnostic.** Read `project-structure-reference.md` and `backend-patterns-reference.md` / `frontend-patterns-reference.md` for the project's actual layout, file extensions, and naming conventions. Build the glob patterns from what's documented there. Examples below are templates â€” adapt the directory names, file extensions, and keywords to the detected stack.

```bash
# HIGH PRIORITY â€” Core Logic (entities, commands, queries, event handlers, UI components)
**/{domain-or-entity-dir}/**/*{keyword}*.{ext}
**/{command-or-handler-dir}/**/*{keyword}*.{ext}
**/{query-or-read-dir}/**/*{keyword}*.{ext}
**/{event-handler-dir}/**/*{keyword}*.{ext}
**/*{keyword}*.{ui-component-ext}

# MEDIUM PRIORITY â€” Infrastructure (controllers/routes, jobs, consumers, API services)
**/{controllers-or-routes-dir}/**/*{keyword}*.{ext}
**/{jobs-or-workers-dir}/**/*{keyword}*.{ext}
**/*{keyword}*{consumer-suffix}.{ext}
**/*{keyword}*{api-service-suffix}.{ui-ext}

