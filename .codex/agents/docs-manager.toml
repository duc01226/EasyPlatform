**Anti-Rationalization:**

| Evasion                                   | Rebuttal                                                                                    |
| ----------------------------------------- | ------------------------------------------------------------------------------------------- |
| "Only `.claude`/config changed, skip all" | Confirm via `git diff --name-only` first — then fast-exit "No documentation impacted".      |
